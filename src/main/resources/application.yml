spring:
  application:
    name: nextech-dashboard-api

  # ── PostgreSQL (Neon) ─────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 5          # Neon free tier: max 5 conexiones
      keepalive-time: 60000         # envía SELECT 1 cada 60 s para mantener viva la conexión
      max-lifetime: 600000          # recicla conexiones cada 10 min (< timeout de Neon)
      connection-test-query: SELECT 1

  jpa:
    hibernate:
      ddl-auto: update              # crea/actualiza tablas automáticamente
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: America/Santiago

  # ── File upload ───────────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

# ── App config ───────────────────────────────────────────────────────
app:
  jwt:
    secret: ${JWT_SECRET}           # min 32 chars, set in env vars
    expiration-ms: 604800000        # 7 días

  woocommerce:
    base-url: ${WC_BASE_URL}        # https://nextech.cl/wp-json/wc/v3
    consumer-key: ${WC_CONSUMER_KEY}
    consumer-secret: ${WC_CONSUMER_SECRET}
    sync-page-size: 100             # órdenes por página en sync
    sync-interval-ms: 900000        # sync cada 15 minutos
    sync-initial-delay-ms: 30000    # 30 s después del arranque

  lioren:
    base-url: ${LIOREN_BASE_URL:https://cl.lioren.enterprises/api}
    api-key: ${LIOREN_API_KEY:pendiente}
    tipo-doc: ${LIOREN_TIPODOC:33}        # 33=Factura, 39=Boleta
    sync-start-folio: ${LIOREN_START_FOLIO:1}   # folio desde donde empieza el sync completo
    sync-tipodoc: ${LIOREN_SYNC_TIPODOC:33}     # tipo de DTE a sincronizar

  upload:
    dir: ${UPLOAD_DIR:uploads/retiro}
    base-url: ${UPLOAD_BASE_URL:http://localhost:8080/files}

# ── CORS ─────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}

# ── Logging ──────────────────────────────────────────────────────────
logging:
  level:
    cl.nextech: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
